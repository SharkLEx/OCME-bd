name: Monitor Engine CI

# ==============================================================================
# CI/CD — OCME bd Monitor Engine
# Story 7.7 — @devops
# Rodado em: push para feat/monitor* ou main
# ==============================================================================

on:
  push:
    branches: [main, 'feat/monitor*']
    paths:
      - 'packages/monitor-engine/**'
      - '.github/workflows/monitor-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/monitor-engine/**'

jobs:
  lint-and-test:
    name: Lint + Test (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/monitor-engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint (flake8)
        run: |
          flake8 . --count --max-line-length=100 \
            --exclude=__pycache__,.env \
            --ignore=E501,W503

      - name: Test
        run: |
          pytest tests/ -v --cov=. --cov-report=term-missing
        env:
          DB_PATH: ':memory:'
          TELEGRAM_TOKEN: 'test:token'
          OPENAI_API_KEY: ''
          RPC_URL: 'https://polygon-bor-rpc.publicnode.com'

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: packages/monitor-engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ocme-monitor:${{ github.sha }} .
          docker build -t ocme-monitor:latest .

      - name: Test container health
        run: |
          docker run --rm \
            -e DB_PATH=/tmp/test.db \
            -e TELEGRAM_TOKEN=test:token \
            --entrypoint python \
            ocme-monitor:latest \
            -c "from monitor_db.migrator import migrate; import sqlite3; conn = sqlite3.connect(':memory:'); migrate(conn); print('DB OK')"

      - name: Security scan (secrets check)
        run: |
          # Verifica que nenhuma chave real está no código
          ! grep -r 'sk-proj-\|AAG\|ALCHEMY' --include='*.py' . \
            || (echo '❌ Credenciais encontradas no código!' && exit 1)
          echo '✅ Nenhuma credencial hardcoded encontrada'
