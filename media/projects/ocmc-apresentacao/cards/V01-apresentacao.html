<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>V01 — O que é o OCME_bd?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #000000; --dark: #131313;
    --pink: #FB0491; --red: #D90048;
    --green: #00FFB2; --cyan: #00D4FF;
    --white: #ffffff; --gray: #888888;
  }
  body {
    width: 1080px; height: 1920px;
    background: var(--black);
    font-family: 'Syne', sans-serif;
    color: var(--white);
    overflow: hidden;
    position: relative;
  }
  /* V01 glow — brand/apresentação */
  body::before {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(251,4,145,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: 100px; left: -150px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(0,212,255,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 48px 64px;
    border-bottom: 1px solid rgba(251,4,145,0.25);
  }
  .logo-wrap { display: flex; align-items: center; gap: 20px; }
  .logo-icon {
    width: 72px; height: 72px; border-radius: 18px;
    background: linear-gradient(135deg, #FB0491 0%, #D90048 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 22px; color: white; letter-spacing: -2px;
  }
  .logo-text {
    font-family: 'Press Start 2P', monospace;
    font-size: 26px; letter-spacing: 1px;
  }
  .logo-text span { color: var(--pink); }
  .header-badge {
    color: var(--pink); font-weight: 700;
    letter-spacing: 3px; font-size: 18px;
  }

  /* ── SCENE AREA ── */
  .scene-area {
    height: 840px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    flex-direction: column;
    gap: 0;
  }

  /* bdZinho imagem real */
  .bdzinho-slot {
    width: 520px; height: 560px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .bdzinho-slot img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 48px rgba(251,4,145,0.5)) drop-shadow(0 0 20px rgba(251,4,145,0.3));
    border-radius: 24px;
  }
  /* Anel orbital animado */
  .bdzinho-slot::before {
    content: '';
    position: absolute;
    width: 540px; height: 540px;
    border-radius: 50%;
    border: 1px solid rgba(251,4,145,0.2);
    animation: pulse-ring 3s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.04); opacity: 0.8; }
  }

  /* Ícones flutuantes ao redor do bdZinho */
  .float-icons {
    position: absolute;
    width: 600px; height: 600px;
  }
  .float-icon {
    position: absolute;
    background: var(--dark);
    border: 1px solid rgba(251,4,145,0.3);
    border-radius: 16px;
    padding: 16px 24px;
    font-size: 28px;
    display: flex; align-items: center; gap: 12px;
  }
  .float-icon span {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 700;
    letter-spacing: 1px;
  }
  .float-icon.eye  { top: 20px;  left: -20px; border-color: rgba(251,4,145,0.4); }
  .float-icon.msg  { top: 20px;  right: -40px; border-color: rgba(0,212,255,0.4); }
  .float-icon.msg span { color: var(--cyan); }
  .float-icon.chart { bottom: 60px; left: 50%; transform: translateX(-50%);
    border-color: rgba(0,255,178,0.4); }
  .float-icon.chart span { color: var(--green); }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(251,4,145,0.3) 30%, rgba(251,4,145,0.3) 70%, transparent 100%);
    margin: 0 64px;
  }

  /* ── TEXT AREA ── */
  .text-area { padding: 56px 64px 0; }
  .text-eyebrow {
    font-size: 20px; font-weight: 700;
    color: var(--pink); letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .text-eyebrow::before {
    content: ''; width: 60px; height: 3px;
    background: var(--pink); flex-shrink: 0;
  }
  .text-main {
    font-size: 84px; font-weight: 800;
    line-height: 1.0; letter-spacing: -2px;
    margin-bottom: 28px;
  }
  .text-main .accent { color: var(--pink); }
  .text-sub {
    font-size: 30px; font-weight: 400;
    color: rgba(255,255,255,0.75);
    line-height: 1.45;
  }

  /* ── FOOTER ── */
  .footer {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 40px 64px;
    border-top: 1px solid rgba(251,4,145,0.2);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,0.85);
  }
  .footer-brand {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px; color: var(--gray);
  }
  .footer-brand span { color: var(--pink); }
  .footer-cta {
    font-size: 20px; font-weight: 700;
    color: var(--pink); letter-spacing: 1px;
  }
</style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo-wrap">
      <div class="logo-icon">bd</div>
      <div class="logo-text">WE<span>bd</span>EX</div>
    </div>
    <div class="header-badge">OCME_bd</div>
  </div>

  <!-- SCENE AREA -->
  <div class="scene-area">
    <!-- Ícones contextuais -->
    <div class="float-icons">
      <div class="float-icon eye">👁️ <span>Monitoramento</span></div>
      <div class="float-icon msg">📲 <span>Telegram</span></div>
      <div class="float-icon chart">📊 <span>Dados Reais</span></div>
    </div>
    <!-- bdZinho real -->
    <div class="bdzinho-slot">
      <img src="../assets/post_149_operador-da-tecnologia_01.jpg" alt="bdZinho">
    </div>
  </div>

  <div class="divider"></div>

  <!-- TEXT AREA -->
  <div class="text-area">
    <div class="text-eyebrow">APRESENTANDO</div>
    <div class="text-main">O <span class="accent">OCME</span>_bd</div>
    <div class="text-sub">Monitoramento em tempo real.<br>Alertas no Telegram.<br>Dados reais do protocolo.</div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-brand">WE<span>bd</span>EX Protocol</div>
    <div class="footer-cta">t.me/OCME_bd →</div>
  </div>

</body>
</html>
