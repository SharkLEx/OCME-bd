<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>V02 — Monitoramento 24/7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #000000; --dark: #131313;
    --pink: #FB0491; --red: #D90048;
    --green: #00FFB2; --cyan: #00D4FF;
    --white: #ffffff; --gray: #888888;
  }
  body {
    width: 1080px; height: 1920px;
    background: var(--black);
    font-family: 'Syne', sans-serif;
    color: var(--white);
    overflow: hidden; position: relative;
  }
  /* V02 glow — verde (monitoramento/urgência) */
  body::before {
    content: '';
    position: absolute;
    top: -150px; right: -150px;
    width: 650px; height: 650px;
    background: radial-gradient(circle, rgba(0,255,178,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: 80px; left: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(251,4,145,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 48px 64px;
    border-bottom: 1px solid rgba(0,255,178,0.2);
  }
  .logo-wrap { display: flex; align-items: center; gap: 20px; }
  .logo-icon {
    width: 72px; height: 72px; border-radius: 18px;
    background: linear-gradient(135deg, #FB0491 0%, #D90048 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 22px; color: white; letter-spacing: -2px;
  }
  .logo-text { font-family: 'Press Start 2P', monospace; font-size: 26px; }
  .logo-text span { color: var(--pink); }
  .header-badge {
    color: var(--green); font-weight: 700;
    letter-spacing: 3px; font-size: 18px;
  }

  /* ── SCENE AREA ── */
  .scene-area {
    height: 840px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  /* Painel de controle / cockpit */
  .cockpit {
    width: 900px; height: 700px;
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
  }

  /* bdZinho no centro */
  .bdzinho-slot {
    width: 420px; height: 420px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    z-index: 2;
  }
  .bdzinho-slot img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 40px rgba(0,255,178,0.45)) drop-shadow(0 0 16px rgba(0,255,178,0.25));
    border-radius: 20px;
  }
  .bdzinho-slot::before {
    content: '';
    position: absolute; inset: -24px;
    border-radius: 24px;
    border: 2px solid rgba(0,255,178,0.2);
    animation: pulse-green 2s ease-in-out infinite;
  }
  @keyframes pulse-green {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.04); opacity: 0.8; }
  }

  /* Telas de monitoramento ao redor */
  .screens-row {
    display: flex; gap: 20px;
    width: 900px; justify-content: center;
  }
  .screen {
    background: var(--dark);
    border-radius: 16px;
    padding: 24px 28px;
    border: 1px solid rgba(0,255,178,0.25);
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .screen::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(0,255,178,0.05) 0%, transparent 60%);
    border-radius: 16px;
    pointer-events: none;
  }
  .screen-label {
    font-size: 14px; font-weight: 700; letter-spacing: 3px;
    color: var(--green); text-transform: uppercase;
    margin-bottom: 10px;
  }
  .screen-value {
    font-size: 32px; font-weight: 800;
    color: var(--white); letter-spacing: -1px;
  }
  .screen-sub {
    font-size: 14px; color: var(--gray); margin-top: 4px;
  }

  /* Barra de status "AO VIVO" */
  .live-bar {
    background: rgba(0,255,178,0.1);
    border: 1px solid rgba(0,255,178,0.35);
    border-radius: 999px;
    padding: 12px 32px;
    font-size: 20px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--green);
    display: flex; align-items: center; gap: 12px;
  }
  .live-dot {
    width: 12px; height: 12px;
    background: var(--green);
    border-radius: 50%;
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(0,255,178,0.3) 30%, rgba(0,255,178,0.3) 70%, transparent 100%);
    margin: 0 64px;
  }

  /* ── TEXT AREA ── */
  .text-area { padding: 52px 64px 0; }
  .text-eyebrow {
    font-size: 20px; font-weight: 700;
    color: var(--green); letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .text-eyebrow::before {
    content: ''; width: 60px; height: 3px;
    background: var(--green); flex-shrink: 0;
  }
  .text-main {
    font-size: 80px; font-weight: 800;
    line-height: 1.0; letter-spacing: -2px;
    margin-bottom: 28px;
  }
  .text-main .accent { color: var(--green); }
  .text-sub {
    font-size: 30px; font-weight: 400;
    color: rgba(255,255,255,0.75); line-height: 1.45;
  }

  /* ── FOOTER ── */
  .footer {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 40px 64px;
    border-top: 1px solid rgba(0,255,178,0.15);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,0.85);
  }
  .footer-brand { font-family: 'Press Start 2P', monospace; font-size: 13px; color: var(--gray); }
  .footer-brand span { color: var(--pink); }
  .footer-cta { font-size: 20px; font-weight: 700; color: var(--green); letter-spacing: 1px; }
</style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo-wrap">
      <div class="logo-icon">bd</div>
      <div class="logo-text">WE<span>bd</span>EX</div>
    </div>
    <div class="header-badge">24/7 · SEM PARAR</div>
  </div>

  <!-- SCENE AREA — Cockpit de monitoramento -->
  <div class="scene-area">
    <div class="cockpit">
      <!-- Telas superiores -->
      <div class="screens-row">
        <div class="screen">
          <div class="screen-label">TVL</div>
          <div class="screen-value">$847K</div>
          <div class="screen-sub">AG_C_bd + bd_v5</div>
        </div>
        <div class="screen">
          <div class="screen-label">Anomalias</div>
          <div class="screen-value">0</div>
          <div class="screen-sub">Últimas 24h</div>
        </div>
        <div class="screen">
          <div class="screen-label">Ciclo</div>
          <div class="screen-value">21h</div>
          <div class="screen-sub">Próximo →</div>
        </div>
      </div>

      <!-- bdZinho real -->
      <div class="bdzinho-slot">
        <img src="../assets/post_145_automação_01.jpg" alt="bdZinho">
      </div>

      <!-- Barra AO VIVO -->
      <div class="live-bar">
        <div class="live-dot"></div>
        MONITORAMENTO AO VIVO
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- TEXT AREA -->
  <div class="text-area">
    <div class="text-eyebrow">24/7 · SEM PARAR</div>
    <div class="text-main">MONITORAMENTO<br>EM TEMPO <span class="accent">REAL</span></div>
    <div class="text-sub">Anomalia detectada? Você recebe um alerta.<br>Milestone atingido? Você é o primeiro a saber.</div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-brand">WE<span>bd</span>EX Protocol</div>
    <div class="footer-cta">t.me/OCME_bd →</div>
  </div>

</body>
</html>
