<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>V04 — Dois Ambientes, Uma Visão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #000000; --dark: #131313;
    --pink: #FB0491; --red: #D90048;
    --green: #00FFB2; --cyan: #00D4FF;
    --white: #ffffff; --gray: #888888;
    --ag: #FF6B00;  /* AG_C_bd laranja */
    --bd5: #0099FF; /* bd_v5 azul */
  }
  body {
    width: 1080px; height: 1920px;
    background: var(--black);
    font-family: 'Syne', sans-serif;
    color: var(--white);
    overflow: hidden; position: relative;
  }
  /* V04 glow — split laranja + ciano */
  body::before {
    content: '';
    position: absolute;
    top: 300px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,107,0,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    top: 300px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,153,255,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 48px 64px;
    border-bottom: 1px solid rgba(251,4,145,0.25);
  }
  .logo-wrap { display: flex; align-items: center; gap: 20px; }
  .logo-icon {
    width: 72px; height: 72px; border-radius: 18px;
    background: linear-gradient(135deg, #FB0491 0%, #D90048 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 22px; color: white; letter-spacing: -2px;
  }
  .logo-text { font-family: 'Press Start 2P', monospace; font-size: 26px; }
  .logo-text span { color: var(--pink); }
  .header-badge { color: var(--pink); font-weight: 700; letter-spacing: 3px; font-size: 18px; }

  /* ── SCENE AREA ── */
  .scene-area {
    height: 860px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  /* Split screen */
  .split-container {
    width: 100%; height: 780px;
    display: flex; position: relative;
  }

  .split-side {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px; padding: 40px;
    position: relative;
  }
  .split-side.left {
    background: linear-gradient(135deg, rgba(255,107,0,0.08) 0%, transparent 60%);
    border-right: none;
  }
  .split-side.right {
    background: linear-gradient(135deg, rgba(0,153,255,0.08) 0%, transparent 60%);
  }

  /* Linha divisória central — rosa brilhante */
  .split-line {
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, transparent 0%, var(--pink) 20%, var(--pink) 80%, transparent 100%);
    transform: translateX(-50%);
    box-shadow: 0 0 20px rgba(251,4,145,0.5);
    z-index: 3;
  }

  .env-emoji { font-size: 72px; }
  .env-name {
    font-size: 36px; font-weight: 800;
    letter-spacing: -1px;
  }
  .env-name.ag { color: var(--ag); }
  .env-name.bd5 { color: var(--bd5); }

  .env-stats {
    display: flex; flex-direction: column; gap: 12px;
    width: 100%;
  }
  .env-stat {
    background: rgba(255,255,255,0.05);
    border-radius: 12px; padding: 14px 18px;
  }
  .env-stat .lbl { font-size: 13px; letter-spacing: 2px; color: var(--gray); text-transform: uppercase; }
  .env-stat .val { font-size: 26px; font-weight: 700; margin-top: 4px; }
  .left .env-stat .val { color: var(--ag); }
  .right .env-stat .val { color: var(--bd5); }

  /* bdZinho no centro (sobre a linha) */
  .bdzinho-center {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    width: 220px; height: 220px;
    background: var(--black);
    border-radius: 50%;
    border: 3px solid var(--pink);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 60px rgba(251,4,145,0.5);
    overflow: hidden;
  }
  .bdzinho-center img {
    width: 120%; height: 120%;
    object-fit: cover;
    object-position: center 20%;
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(251,4,145,0.3) 30%, rgba(251,4,145,0.3) 70%, transparent 100%);
    margin: 0 64px;
  }

  /* ── TEXT AREA ── */
  .text-area { padding: 48px 64px 0; }
  .text-eyebrow {
    font-size: 20px; font-weight: 700;
    color: var(--pink); letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .text-eyebrow::before {
    content: ''; width: 60px; height: 3px;
    background: var(--pink); flex-shrink: 0;
  }
  .text-main {
    font-size: 76px; font-weight: 800;
    line-height: 1.0; letter-spacing: -2px;
    margin-bottom: 28px;
  }
  .text-main .accent { color: var(--cyan); }
  .text-sub {
    font-size: 28px; font-weight: 400;
    color: rgba(255,255,255,0.75); line-height: 1.45;
  }

  /* ── FOOTER ── */
  .footer {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 40px 64px;
    border-top: 1px solid rgba(251,4,145,0.2);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,0.85);
  }
  .footer-brand { font-family: 'Press Start 2P', monospace; font-size: 13px; color: var(--gray); }
  .footer-brand span { color: var(--pink); }
  .footer-cta { font-size: 20px; font-weight: 700; color: var(--cyan); letter-spacing: 1px; }
</style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo-wrap">
      <div class="logo-icon">bd</div>
      <div class="logo-text">WE<span>bd</span>EX</div>
    </div>
    <div class="header-badge">DOIS AMBIENTES</div>
  </div>

  <!-- SCENE AREA — Split screen -->
  <div class="scene-area">
    <div class="split-container">
      <!-- Lado esquerdo — AG_C_bd -->
      <div class="split-side left">
        <div class="env-emoji">🟠</div>
        <div class="env-name ag">AG_C_bd</div>
        <div class="env-stats">
          <div class="env-stat">
            <div class="lbl">TVL</div>
            <div class="val">$423K</div>
          </div>
          <div class="env-stat">
            <div class="lbl">Traders</div>
            <div class="val">38</div>
          </div>
          <div class="env-stat">
            <div class="lbl">Ciclo</div>
            <div class="val">21h ⏳</div>
          </div>
        </div>
      </div>

      <!-- Linha central + bdZinho -->
      <div class="split-line"></div>
      <div class="bdzinho-center">
        <img src="../assets/post_148_ambiente-financeiro_01.jpg" alt="bdZinho">
      </div>

      <!-- Lado direito — bd_v5 -->
      <div class="split-side right">
        <div class="env-emoji">🔵</div>
        <div class="env-name bd5">bd_v5</div>
        <div class="env-stats">
          <div class="env-stat">
            <div class="lbl">TVL</div>
            <div class="val">$424K</div>
          </div>
          <div class="env-stat">
            <div class="lbl">Traders</div>
            <div class="val">41</div>
          </div>
          <div class="env-stat">
            <div class="lbl">Ciclo</div>
            <div class="val">21h ⏳</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- TEXT AREA -->
  <div class="text-area">
    <div class="text-eyebrow">DOIS AMBIENTES</div>
    <div class="text-main">UMA VISÃO<br><span class="accent">COMPLETA</span></div>
    <div class="text-sub">O OCME_bd monitora os dois.<br>Ao mesmo tempo. Sem perder nada.</div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-brand">WE<span>bd</span>EX Protocol</div>
    <div class="footer-cta">t.me/OCME_bd →</div>
  </div>

</body>
</html>
