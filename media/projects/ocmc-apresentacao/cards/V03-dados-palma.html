<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>V03 — Seus Dados na Palma da Mão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #000000; --dark: #131313;
    --pink: #FB0491; --red: #D90048;
    --green: #00FFB2; --cyan: #00D4FF;
    --white: #ffffff; --gray: #888888;
  }
  body {
    width: 1080px; height: 1920px;
    background: var(--black);
    font-family: 'Syne', sans-serif;
    color: var(--white);
    overflow: hidden; position: relative;
  }
  /* V03 glow — pink (dados pessoais/confiança) */
  body::before {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(251,4,145,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: 80px; left: -120px;
    width: 450px; height: 450px;
    background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 48px 64px;
    border-bottom: 1px solid rgba(251,4,145,0.25);
  }
  .logo-wrap { display: flex; align-items: center; gap: 20px; }
  .logo-icon {
    width: 72px; height: 72px; border-radius: 18px;
    background: linear-gradient(135deg, #FB0491 0%, #D90048 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 22px; color: white; letter-spacing: -2px;
  }
  .logo-text { font-family: 'Press Start 2P', monospace; font-size: 26px; }
  .logo-text span { color: var(--pink); }
  .header-badge { color: var(--pink); font-weight: 700; letter-spacing: 3px; font-size: 18px; }

  /* ── SCENE AREA ── */
  .scene-area {
    height: 840px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  /* Mock Telegram */
  .telegram-mock {
    width: 380px;
    background: #1E2029;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(251,4,145,0.2), 0 0 0 1px rgba(251,4,145,0.15);
    position: relative;
    z-index: 2;
    margin-right: 40px;
  }
  .tg-header {
    background: #2C2F3E;
    padding: 20px 24px;
    display: flex; align-items: center; gap: 14px;
  }
  .tg-avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, #FB0491, #D90048);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .tg-name { font-size: 18px; font-weight: 700; }
  .tg-status { font-size: 13px; color: var(--green); margin-top: 2px; }
  .tg-body { padding: 24px 20px; display: flex; flex-direction: column; gap: 12px; }
  .tg-msg {
    background: #2C2F3E;
    border-radius: 18px 18px 18px 4px;
    padding: 14px 18px;
    font-size: 17px; line-height: 1.4;
  }
  .tg-msg .val { color: var(--green); font-weight: 700; }
  .tg-msg .lbl { color: var(--gray); font-size: 14px; }
  .tg-buttons {
    padding: 0 20px 20px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .tg-btn {
    background: rgba(251,4,145,0.15);
    border: 1px solid rgba(251,4,145,0.35);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 17px; font-weight: 700;
    color: var(--white); text-align: center;
    letter-spacing: 0.5px;
  }
  .tg-btn.active { background: rgba(0,255,178,0.12); border-color: rgba(0,255,178,0.35); color: var(--green); }

  /* bdZinho ao lado */
  .bdzinho-side {
    width: 320px; height: 580px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .bdzinho-side img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 40px rgba(251,4,145,0.5)) drop-shadow(0 0 16px rgba(251,4,145,0.3));
    border-radius: 20px;
  }
  .bdzinho-side::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(251,4,145,0.12) 0%, transparent 70%);
    border-radius: 20px;
    pointer-events: none;
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(251,4,145,0.3) 30%, rgba(251,4,145,0.3) 70%, transparent 100%);
    margin: 0 64px;
  }

  /* ── TEXT AREA ── */
  .text-area { padding: 52px 64px 0; }
  .text-eyebrow {
    font-size: 20px; font-weight: 700;
    color: var(--pink); letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .text-eyebrow::before {
    content: ''; width: 60px; height: 3px;
    background: var(--pink); flex-shrink: 0;
  }
  .text-main {
    font-size: 80px; font-weight: 800;
    line-height: 1.0; letter-spacing: -2px;
    margin-bottom: 28px;
  }
  .text-main .accent { color: var(--pink); }
  .text-sub {
    font-size: 30px; font-weight: 400;
    color: rgba(255,255,255,0.75); line-height: 1.45;
  }

  /* ── FOOTER ── */
  .footer {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 40px 64px;
    border-top: 1px solid rgba(251,4,145,0.2);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,0.85);
  }
  .footer-brand { font-family: 'Press Start 2P', monospace; font-size: 13px; color: var(--gray); }
  .footer-brand span { color: var(--pink); }
  .footer-cta { font-size: 20px; font-weight: 700; color: var(--pink); letter-spacing: 1px; }
</style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo-wrap">
      <div class="logo-icon">bd</div>
      <div class="logo-text">WE<span>bd</span>EX</div>
    </div>
    <div class="header-badge">SEUS DADOS</div>
  </div>

  <!-- SCENE AREA -->
  <div class="scene-area">
    <!-- Mock Telegram -->
    <div class="telegram-mock">
      <div class="tg-header">
        <div class="tg-avatar">🤖</div>
        <div>
          <div class="tg-name">OCME_bd</div>
          <div class="tg-status">● online</div>
        </div>
      </div>
      <div class="tg-body">
        <div class="tg-msg">
          <div class="lbl">💼 Seu Capital</div>
          <div class="val">$2.847,00</div>
        </div>
        <div class="tg-msg">
          <div class="lbl">✅ P&L do Ciclo</div>
          <div class="val">+$127,40 (+4.7%)</div>
        </div>
        <div class="tg-msg">
          <div class="lbl">📊 Posições Abertas</div>
          <div class="val">3 ativas</div>
        </div>
      </div>
      <div class="tg-buttons">
        <div class="tg-btn active">📊 mybdBook</div>
        <div class="tg-btn">📈 Gráfico</div>
        <div class="tg-btn">⚡ Status</div>
      </div>
    </div>

    <!-- bdZinho real -->
    <div class="bdzinho-side">
      <img src="../assets/post_147_SubAccount_story_01.jpg" alt="bdZinho">
    </div>
  </div>

  <div class="divider"></div>

  <!-- TEXT AREA -->
  <div class="text-area">
    <div class="text-eyebrow">SEUS DADOS</div>
    <div class="text-main">NA PALMA<br>DA <span class="accent">MÃO</span></div>
    <div class="text-sub">Capital. Posições. P&L do ciclo.<br>Tudo em tempo real no Telegram.</div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-brand">WE<span>bd</span>EX Protocol</div>
    <div class="footer-cta">t.me/OCME_bd →</div>
  </div>

</body>
</html>
